<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Новости</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      padding: 20px;
      color: white;
    }

    .phone {
      width: 390px;
      background: #1a1a1a;
      border-radius: 30px;
      overflow: hidden;
      border: 2px solid #333;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .header {
      padding: 20px;
      font-size: 34px;
      font-weight: bold;
      background: #000;
    }

    .feed {
      padding: 15px;
    }

    .card {
      background: #222;
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .image {
      height: 210px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 70px;
    }

    .img1 { background: linear-gradient(135deg,#4b79a1,#283e51); }
    .img2 { background: linear-gradient(135deg,#232526,#414345); }
    .img3 { background: linear-gradient(135deg,#654ea3,#eaafc8); }
    .img4 { background: linear-gradient(135deg,#000428,#004e92); }

    .content {
      padding: 16px;
    }

    .title {
      font-size: 22px;
      line-height: 1.35;
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      gap: 24px;
      color: #bbb;
      font-size: 18px;
    }

    .action {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer {
      display: flex;
      justify-content: space-around;
      padding: 16px;
      background: #000;
      color: #aaa;
      font-size: 14px;
    }
	
	.real-image {
  width: 100%;
  height: 210px;
  object-fit: cover;
  display: block;
}

    .footer div {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">Новости</div>

    <div class="feed">

      <div class="card">
        <div class="image img1">🏙️</div>
        <div class="content">
          <div class="title">В Москве стартовал международный форум технологий</div>
          <div class="actions">
            <div class="action">❤️ 241</div>
            <div class="action">💬 38</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="image img2">📱</div>
        <div class="content">
          <div class="title">Новая соцсеть набирает популярность среди молодежи</div>
          <div class="actions">
            <div class="action">❤️ 512</div>
            <div class="action">💬 67</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="image img3">🏆</div>
        <div class="content">
          <!--<div class="title">Магомед Муртазаалиев — победитель шоу «Выжить в Стамбуле» и собирается на выигрыш купить машину</div>-->
		  <img 
  src="https://uznayvse.ru/images/content/2026/1/19/magomed-murtazaaliev-takes-a-selfie-while-sitting-in-a-car_978.jpg"
  alt="Магомед Муртазаалиев"
  class="real-image"
/>
          <div class="actions">
            <div class="action">❤️ 1257</div>
            <div class="action">💬 87</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="image img4">🚀</div>
        <div class="content">
          <div class="title">SpaceX успешно протестировала новый двигатель Starship</div>
          <div class="actions">
            <div class="action">❤️ 834</div>
            <div class="action">💬 59</div>
          </div>
        </div>
      </div>

    </div>

    <div class="footer">
      <div>🏠<br>Главная</div>
      <div>📰<br>Новости</div>
      <div>👤<br>Профиль</div>
    </div>
  </div>
</body>
</html>
